name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify spidermonkey-wasm attestations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # make verify checks every in-tree file against the release sha256
      # manifest AND its upstream SLSA build-provenance attestation (fetched
      # anonymously from the public attestation API — no token needed; the
      # Makefile unsets GH_TOKEN/GITHUB_TOKEN). gh, jq, curl and shasum are
      # preinstalled on ubuntu-latest.
      - name: Verify wasm2go bundle (release diff + attestation)
        run: make verify

  build:
    name: Go build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build
